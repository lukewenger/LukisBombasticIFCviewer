# docker-compose.coolify.yml — Coolify deployment stack
#
# Required environment variables (set in Coolify UI → Environment Variables):
#   DB_PASSWORD   — strong random password for PostgreSQL
#   JWT_SECRET    — strong random string (≥ 32 chars)
#
# Service start order:
#   postgres (healthy) → migrate (completed) → api (healthy) → frontend

services:

  # ── PostgreSQL ────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: bombasticifcdb
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d bombasticifcdb"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ── EF Core migration (one-shot) ─────────────────────────────────────────
  # Mirrors the K8s initContainer pattern: runs all pending EF Core migrations
  # and exits 0 on success / 1 on failure. The api service waits for this to
  # complete successfully before starting (service_completed_successfully).
  migrate:
    build:
      context: .
      dockerfile: Dockerfile
    entrypoint: ["dotnet", "BombasticIFC.API.dll", "--migrate"]
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=bombasticifcdb;Username=postgres;Password=${DB_PASSWORD}"

  # ── API (.NET 8 / ASP.NET Core) ──────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=bombasticifcdb;Username=postgres;Password=${DB_PASSWORD}"
      # JWT_SECRET is injected by Coolify as a runtime env var.
      # Program.cs reads JwtSettings__Secret first, then falls back to JWT_SECRET.
      # JwtSettings__Secret is intentionally omitted here — ${JWT_SECRET} compose
      # substitution is unreliable in Coolify's env-file mechanism; the runtime
      # injection of JWT_SECRET (handled by Coolify automatically) takes effect instead.
      StoragePath: /data/storage
    volumes:
      - ifc-storage:/data/storage
    # Not exposed to Traefik — the frontend nginx proxy handles all /api/ traffic.
    expose:
      - "8080"
    healthcheck:
      # wget and curl are not available in the mcr.microsoft.com/dotnet/aspnet:8.0 image.
      # Use bash's built-in /dev/tcp to open a TCP connection to port 8080 instead.
      # bash IS available in the Debian-based aspnet image.
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/8080'"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s

  # ── Frontend (Vue 3 / nginx) ──────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    environment:
      # Nginx proxies /api/ → http://api:8080 (Docker Compose internal DNS).
      API_UPSTREAM: http://api:8080
    ports:
      - "8090:80"

volumes:
  postgres-data:
  ifc-storage:
