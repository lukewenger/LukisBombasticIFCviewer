version: '3.8'

# BombasticIFC — local development multi-service stack
#
# Usage:
#   cp .env.example .env        # edit passwords before first use
#   docker compose up -d        # start all services
#   docker compose down         # stop all services
#   docker compose down -v      # stop + remove volumes (clears DB)
#
# Services: postgres | api | frontend
# Access:   http://localhost        (frontend via nginx)
#           http://localhost/api    (API via nginx reverse proxy)
#           http://localhost:5000   (API direct access)
#           postgres on localhost:5432 (dev only)

services:

  # ─── PostgreSQL 16 ───────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: bombasticifccluster-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
      POSTGRES_DB: ${POSTGRES_DB:-bombasticifcdb}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - backend-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ─── .NET 8 API ──────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bombasticifccluster-api
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=${POSTGRES_DB:-bombasticifcdb};Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
      - JwtSettings__Secret=${JWT_SECRET:?JWT_SECRET must be set in .env}
      - JwtSettings__Issuer=BombasticIFC
      - JwtSettings__Audience=BombasticIFC-Client
      - JwtSettings__ExpirationMinutes=60
      - StoragePath=/data/storage
    ports:
      - "5000:80"
    volumes:
      - storage-data:/data/storage
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - backend-net
      - frontend-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:80/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ─── Vue.js Frontend (nginx) ─────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: bombasticifccluster-frontend
    # Override the default nginx config with a Docker-Compose-aware one
    # that proxies /api to the 'api' service name (not K8s DNS)
    volumes:
      - ./frontend/nginx.compose.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - frontend-net
    restart: unless-stopped

volumes:
  postgres-data:
    driver: local
  storage-data:
    driver: local

networks:
  # frontend-net: frontend ↔ api communication (reverse proxy)
  frontend-net:
    driver: bridge
  # backend-net: api ↔ postgres communication only
  backend-net:
    driver: bridge
