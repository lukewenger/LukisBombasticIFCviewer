# railway.toml — BombasticIFC Railway deployment configuration
# Documentation: https://docs.railway.app/reference/config-as-code
#
# PORT BINDING — HOW IT WORKS
# ─────────────────────────────────────────────────────────────────────────────
# Railway injects a $PORT environment variable at runtime. The Dockerfile
# ENTRYPOINT uses `--urls http://+:${PORT:-8080}` (shell form) so Kestrel
# automatically binds to whatever port Railway assigns.
# You do NOT need to set PORT manually — Railway handles this injection.
#
# REQUIRED environment variables (set in Railway dashboard → Variables tab):
# ─────────────────────────────────────────────────────────────────────────────
#
#   ConnectionStrings__DefaultConnection
#     Use Railway's Postgres plugin variables (available after adding the plugin):
#       Host=${{PGHOST}};Port=${{PGPORT}};Database=${{PGDATABASE}};Username=${{PGUSER}};Password=${{PGPASSWORD}}
#     Paste that entire string as the value — Railway resolves ${{VAR}} references at deploy time.
#
#   JwtSettings__Secret
#     Generate with: openssl rand -base64 32
#     Paste the output directly as the value.
#
#   ASPNETCORE_ENVIRONMENT
#     Value: Production
#
# OPTIONAL (defaults work out of the box):
# ─────────────────────────────────────────────────────────────────────────────
#   JwtSettings__Issuer             default: BombasticIFC
#   JwtSettings__Audience           default: BombasticIFC-Client
#   JwtSettings__ExpirationMinutes  default: 60
#   StoragePath                     default: /data/storage

[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile"

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 10
