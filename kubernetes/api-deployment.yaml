apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-deployment
  namespace: bombasticifccluster
  labels:
    app: bombasticifccluster-api
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: bombasticifccluster-api
  template:
    metadata:
      labels:
        app: bombasticifccluster-api
    spec:
      terminationGracePeriodSeconds: 120
      imagePullSecrets:
      - name: ghcr-login-secret
      # ── EF Core migration initContainer ─────────────────────────────────────
      # Runs all pending EF Core migrations before the API container starts.
      # Uses the same image as the API container so the migration assembly is
      # always in sync with the running application code.
      # The initContainer must exit 0 for the pod to proceed — a failed
      # migration halts the rollout at the pod level, surfacing the error in
      # kubectl describe pod rather than hiding it as a 500 response.
      initContainers:
      - name: migrator
        image: ghcr.io/lukewenger/bombasticifccluster-api:latest
        imagePullPolicy: IfNotPresent
        command: ["dotnet", "BombasticIFC.API.dll", "--migrate"]
        env:
        - name: ASPNETCORE_ENVIRONMENT
          value: "Production"
        - name: ConnectionStrings__DefaultConnection
          valueFrom:
            secretKeyRef:
              name: bombasticifccluster-secrets
              key: connection-string
        - name: JwtSettings__Secret
          valueFrom:
            secretKeyRef:
              name: bombasticifccluster-secrets
              key: jwt-secret
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
      containers:
      - name: api
        image: ghcr.io/lukewenger/bombasticifccluster-api:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
        env:
        - name: ASPNETCORE_ENVIRONMENT
          value: "Production"
        - name: ConnectionStrings__DefaultConnection
          valueFrom:
            secretKeyRef:
              name: bombasticifccluster-secrets
              key: connection-string
        - name: JwtSettings__Secret
          valueFrom:
            secretKeyRef:
              name: bombasticifccluster-secrets
              key: jwt-secret
        - name: StoragePath
          value: "/data/storage"
        volumeMounts:
        - name: storage-volume
          mountPath: /data/storage
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 5
        startupProbe:
          httpGet:
            path: /health
            port: 8080
          failureThreshold: 30
          periodSeconds: 5
      volumes:
      - name: storage-volume
        persistentVolumeClaim:
          claimName: storage-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: api-service
  namespace: bombasticifccluster
  labels:
    app: bombasticifccluster-api
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 8080
    protocol: TCP
  selector:
    app: bombasticifccluster-api
---
apiVersion: v1
kind: Service
metadata:
  name: api-nodeport
  namespace: bombasticifccluster
  labels:
    app: bombasticifccluster-api
spec:
  type: NodePort
  ports:
  - port: 80
    targetPort: 8080
    nodePort: 30080
    protocol: TCP
  selector:
    app: bombasticifccluster-api
