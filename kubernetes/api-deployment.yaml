apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-deployment
  namespace: bombasticifccluster
  labels:
    app: bombasticifccluster-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: bombasticifccluster-api
  template:
    metadata:
      labels:
        app: bombasticifccluster-api
    spec:
      containers:
      - name: api
        image: bombasticifccluster-api:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 80
        env:
        - name: ASPNETCORE_ENVIRONMENT
          value: "Production"
        - name: ConnectionStrings__DefaultConnection
          valueFrom:
            secretKeyRef:
              name: bombasticifccluster-secrets
              key: connection-string
        - name: StoragePath
          value: "/data/storage"
        volumeMounts:
        - name: storage-volume
          mountPath: /data/storage
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 5
      volumes:
      - name: storage-volume
        persistentVolumeClaim:
          claimName: storage-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: api-service
  namespace: bombasticifccluster
  labels:
    app: bombasticifccluster-api
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 80
    protocol: TCP
  selector:
    app: bombasticifccluster-api
---
apiVersion: v1
kind: Service
metadata:
  name: api-nodeport
  namespace: bombasticifccluster
  labels:
    app: bombasticifccluster-api
spec:
  type: NodePort
  ports:
  - port: 80
    targetPort: 80
    nodePort: 30080
    protocol: TCP
  selector:
    app: bombasticifccluster-api
