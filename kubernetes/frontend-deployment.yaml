apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-deployment
  namespace: bombasticifccluster
  labels:
    app: bombasticifccluster-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bombasticifccluster-frontend
  template:
    metadata:
      labels:
        app: bombasticifccluster-frontend
    spec:
      containers:
      - name: frontend
        image: bombasticifccluster-frontend:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 80
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: bombasticifccluster
  labels:
    app: bombasticifccluster-frontend
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 80
    protocol: TCP
  selector:
    app: bombasticifccluster-frontend
