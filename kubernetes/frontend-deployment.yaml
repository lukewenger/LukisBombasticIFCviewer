apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-deployment
  namespace: bombasticifccluster
  labels:
    app: bombasticifccluster-frontend
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: bombasticifccluster-frontend
  template:
    metadata:
      labels:
        app: bombasticifccluster-frontend
    spec:
      imagePullSecrets:
      - name: ghcr-login-secret
      containers:
      - name: frontend
        image: ghcr.io/lukewenger/bombasticifccluster-frontend:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 80
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "250m"
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: bombasticifccluster
  labels:
    app: bombasticifccluster-frontend
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 80
    protocol: TCP
  selector:
    app: bombasticifccluster-frontend
