name: CI/CD — BombasticIFC

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  API_IMAGE: ghcr.io/${{ github.repository_owner }}/bombasticifccluster-api
  FRONTEND_IMAGE: ghcr.io/${{ github.repository_owner }}/bombasticifccluster-frontend

jobs:
  # ─────────────────────────────────────────────
  # Job 1: Quality — lint + test
  # Fast/cheap tier: catches issues before a build
  # ─────────────────────────────────────────────
  quality:
    name: Quality (lint + test)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── .NET restore cache ────────────────────
      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Set up .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore .NET dependencies
        run: dotnet restore

      - name: Build .NET solution
        run: dotnet build --no-restore -c Release

      - name: Run .NET tests
        run: dotnet test --no-build -c Release --verbosity normal

      # ── Frontend lint ─────────────────────────
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci --legacy-peer-deps

      - name: TypeScript type-check (vue-tsc)
        working-directory: frontend
        # -b (build mode) and --noEmit are mutually exclusive in TypeScript —
        # combining them causes the process to hang indefinitely.
        # Target tsconfig.app.json directly: it has the src/**/*.vue include glob.
        # The root tsconfig.json has "files":[] and is only for project-references
        # build mode (vite build / vue-tsc -b), not for standalone type checking.
        run: npx vue-tsc --noEmit -p tsconfig.app.json

  # ─────────────────────────────────────────────
  # Job 2: Build — Docker images
  # Needs quality to pass first
  # ─────────────────────────────────────────────
  build:
    name: Build Docker images
    runs-on: ubuntu-latest
    needs: quality

    outputs:
      api_tag: ${{ steps.meta-api.outputs.tags }}
      frontend_tag: ${{ steps.meta-frontend.outputs.tags }}
      git_sha: ${{ github.sha }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Docker layer caching — speeds up subsequent builds significantly
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── API image metadata ────────────────────
      - name: Extract metadata for API image
        id: meta-api
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.API_IMAGE }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      # ── Frontend image metadata ───────────────
      - name: Extract metadata for Frontend image
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.FRONTEND_IMAGE }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      # Build API image (no push on PRs)
      - name: Build API Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: false
          tags: ${{ steps.meta-api.outputs.tags }}
          labels: ${{ steps.meta-api.outputs.labels }}
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api

      # Build Frontend image (no push on PRs)
      - name: Build Frontend Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: frontend/Dockerfile
          push: false
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

  # ─────────────────────────────────────────────
  # Job 3: Push — publish images to GHCR
  # Only on push to main (not on PRs)
  # Needs build to pass first
  # ─────────────────────────────────────────────
  push:
    name: Push images to GHCR
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── API image metadata (re-run for push) ──
      - name: Extract metadata for API image
        id: meta-api
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.API_IMAGE }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest

      # ── Frontend image metadata (re-run for push) ──
      - name: Extract metadata for Frontend image
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.FRONTEND_IMAGE }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest

      # Build + push API image
      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.meta-api.outputs.tags }}
          labels: ${{ steps.meta-api.outputs.labels }}
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api

      # Build + push Frontend image
      - name: Build and push Frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: frontend/Dockerfile
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

      - name: Output published image tags
        run: |
          echo "API image tags: ${{ steps.meta-api.outputs.tags }}"
          echo "Frontend image tags: ${{ steps.meta-frontend.outputs.tags }}"
          echo "Git SHA: ${{ github.sha }}"

  # ─────────────────────────────────────────────
  # Job 4: Deploy — rolling update on VM
  # SSHs into the VM, pulls latest manifests,
  # upserts secrets, applies them, and triggers
  # a rolling restart so kubectl pulls new :latest
  # images from GHCR.
  # ─────────────────────────────────────────────
  deploy:
    name: Deploy to VM
    runs-on: ubuntu-latest
    needs: push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    env:
      GHCR_USERNAME: ${{ github.repository_owner }}
      GHCR_PAT: ${{ secrets.GHCR_PAT }}
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_SSH_HOST }}
          username: ${{ secrets.VM_SSH_USER }}
          key: ${{ secrets.VM_SSH_PRIVATE_KEY }}
          envs: GHCR_USERNAME,GHCR_PAT,DB_PASSWORD,JWT_SECRET
          script: |
            set -e

            echo "=== Pulling latest manifests ==="
            cd ~/LukisBombasticIFCviewer
            git pull origin main

            echo "=== Ensuring namespace exists ==="
            kubectl apply -f kubernetes/namespace.yaml

            echo "=== Upserting GHCR pull secret ==="
            kubectl create secret docker-registry ghcr-login-secret \
              --docker-server=ghcr.io \
              --docker-username="$GHCR_USERNAME" \
              --docker-password="$GHCR_PAT" \
              --namespace=bombasticifccluster \
              --dry-run=client -o yaml | kubectl apply -f -

            echo "=== Upserting app secrets ==="
            DB_CONN="Host=postgres-service;Port=5432;Database=bombasticifcdb;Username=postgres;Password=${DB_PASSWORD}"
            kubectl create secret generic bombasticifccluster-secrets \
              --from-literal=postgres-user=postgres \
              --from-literal=postgres-password="$DB_PASSWORD" \
              --from-literal=postgres-db=bombasticifcdb \
              --from-literal=connection-string="$DB_CONN" \
              --from-literal=jwt-secret="$JWT_SECRET" \
              --namespace=bombasticifccluster \
              --dry-run=client -o yaml | kubectl apply -f -

            echo "=== Applying Kubernetes manifests ==="
            kubectl apply -f kubernetes/configmap.yaml
            kubectl apply -f kubernetes/persistent-volumes.yaml
            kubectl apply -f kubernetes/postgres-deployment.yaml
            kubectl apply -f kubernetes/api-deployment.yaml
            kubectl apply -f kubernetes/frontend-deployment.yaml
            kubectl apply -f kubernetes/ingress.yaml

            echo "=== Triggering rolling restart (pulls new :latest from GHCR) ==="
            kubectl rollout restart deployment/api-deployment      -n bombasticifccluster
            kubectl rollout restart deployment/frontend-deployment -n bombasticifccluster

            echo "=== Waiting for rollout to complete ==="
            kubectl rollout status deployment/api-deployment      -n bombasticifccluster --timeout=5m
            kubectl rollout status deployment/frontend-deployment -n bombasticifccluster --timeout=5m

            echo "=== Deployment complete ==="
            kubectl get pods -n bombasticifccluster
