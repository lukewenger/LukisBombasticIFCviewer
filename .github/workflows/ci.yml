name: CI/CD — BombasticIFC

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  API_IMAGE: ghcr.io/${{ github.repository_owner }}/bombasticifccluster-api
  FRONTEND_IMAGE: ghcr.io/${{ github.repository_owner }}/bombasticifccluster-frontend

jobs:
  # ─────────────────────────────────────────────
  # Job 1: Quality — lint + test
  # Fast/cheap tier: catches issues before a build
  # ─────────────────────────────────────────────
  quality:
    name: Quality (lint + test)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── .NET restore cache ────────────────────
      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Set up .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore .NET dependencies
        run: dotnet restore

      - name: Build .NET solution
        run: dotnet build --no-restore -c Release

      - name: Run .NET tests
        run: dotnet test --no-build -c Release --verbosity normal

      # ── Frontend lint ─────────────────────────
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci --legacy-peer-deps

      - name: TypeScript type-check (vue-tsc)
        working-directory: frontend
        # -b (build mode) and --noEmit are mutually exclusive in TypeScript —
        # combining them causes the process to hang indefinitely.
        # Target tsconfig.app.json directly: it has the src/**/*.vue include glob.
        # The root tsconfig.json has "files":[] and is only for project-references
        # build mode (vite build / vue-tsc -b), not for standalone type checking.
        run: npx vue-tsc --noEmit -p tsconfig.app.json

  # ─────────────────────────────────────────────
  # Job 2: Build — Docker images
  # Needs quality to pass first
  # ─────────────────────────────────────────────
  build:
    name: Build Docker images
    runs-on: ubuntu-latest
    needs: quality

    outputs:
      api_tag: ${{ steps.meta-api.outputs.tags }}
      frontend_tag: ${{ steps.meta-frontend.outputs.tags }}
      git_sha: ${{ github.sha }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Docker layer caching — speeds up subsequent builds significantly
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── API image metadata ────────────────────
      - name: Extract metadata for API image
        id: meta-api
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.API_IMAGE }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      # ── Frontend image metadata ───────────────
      - name: Extract metadata for Frontend image
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.FRONTEND_IMAGE }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      # Build API image (no push on PRs)
      - name: Build API Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: false
          tags: ${{ steps.meta-api.outputs.tags }}
          labels: ${{ steps.meta-api.outputs.labels }}
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api

      # Build Frontend image (no push on PRs)
      - name: Build Frontend Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: frontend/Dockerfile
          push: false
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

  # ─────────────────────────────────────────────
  # Job 3: Push — publish images to GHCR
  # Only on push to main (not on PRs)
  # Needs build to pass first
  # ─────────────────────────────────────────────
  push:
    name: Push images to GHCR
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── API image metadata (re-run for push) ──
      - name: Extract metadata for API image
        id: meta-api
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.API_IMAGE }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest

      # ── Frontend image metadata (re-run for push) ──
      - name: Extract metadata for Frontend image
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.FRONTEND_IMAGE }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest

      # Build + push API image
      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.meta-api.outputs.tags }}
          labels: ${{ steps.meta-api.outputs.labels }}
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api

      # Build + push Frontend image
      - name: Build and push Frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: frontend/Dockerfile
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

      - name: Output published image tags
        run: |
          echo "API image tags: ${{ steps.meta-api.outputs.tags }}"
          echo "Frontend image tags: ${{ steps.meta-frontend.outputs.tags }}"
          echo "Git SHA: ${{ github.sha }}"

  # ─────────────────────────────────────────────
  # Job 4: Deploy — rolling update on VM (Minikube)
  # Runs directly on the self-hosted runner installed
  # on the VM — no SSH or inbound connectivity needed.
  # The runner phones home to GitHub and executes the
  # job locally where Minikube and kubectl already live.
  #
  # One-time VM setup:
  #   1. Repo → Settings → Actions → Runners → New self-hosted runner
  #   2. Follow the Linux install instructions on that page
  #   3. docker login ghcr.io -u <user> -p <PAT with read:packages>
  # ─────────────────────────────────────────────
  deploy:
    name: Deploy to VM (Minikube)
    runs-on: self-hosted
    needs: push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    env:
      GHCR_USERNAME: ${{ github.repository_owner }}
      GHCR_PAT: ${{ secrets.GHCR_PAT }}
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Pull new images from GHCR
        run: |
          docker pull ghcr.io/lukewenger/bombasticifccluster-api:latest
          docker pull ghcr.io/lukewenger/bombasticifccluster-frontend:latest

      - name: Load images into Minikube
        run: |
          minikube image load ghcr.io/lukewenger/bombasticifccluster-api:latest
          minikube image load ghcr.io/lukewenger/bombasticifccluster-frontend:latest

      - name: Apply Kubernetes manifests
        run: |
          kubectl apply -f kubernetes/namespace.yaml
          kubectl apply -f kubernetes/configmap.yaml
          kubectl apply -f kubernetes/persistent-volumes.yaml
          kubectl apply -f kubernetes/postgres-deployment.yaml
          kubectl apply -f kubernetes/api-deployment.yaml
          kubectl apply -f kubernetes/frontend-deployment.yaml
          kubectl apply -f kubernetes/ingress.yaml

      - name: Trigger rolling restart
        run: |
          kubectl rollout restart deployment/api-deployment      -n bombasticifccluster
          kubectl rollout restart deployment/frontend-deployment -n bombasticifccluster

      - name: Wait for rollout to complete
        run: |
          kubectl rollout status deployment/api-deployment      -n bombasticifccluster --timeout=5m
          kubectl rollout status deployment/frontend-deployment -n bombasticifccluster --timeout=5m

      - name: Show pod status
        run: kubectl get pods -n bombasticifccluster
